<!DOCTYPE html>
<head>
    <title>Calculator v1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculator</h1>
    <input type="text" id="num1" placeholder="First Number">
    <input type="text" id="operator" placeholder="Enter operator (+ - * /)" pattern="[+\-*/]" required>
    <input type="text" id="num2" placeholder="Second Number">
    <button onclick="calculate()">Calculate</button>

    <script>
        function calculate() {
            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);
            var op = document.getElementById("operator").value.trim()
            
            if (op === "+") {
        result = num1 + num2;
      } else if (op === "-") {
        result = num1 - num2;
      } else if (op === "*") {
        result = num1 * num2;
      } else if (op === "/") {
        if (num2 === 0) {
          result = "Error (divide by zero)";
        } else {
          result = num1 / num2;
        }
      } else {
        result = "Invalid operator";
      }
            
            alert("The result is: " + result);
        }
    </script>

    <script>
    const operatorInput = document.getElementById("operator");

    operatorInput.addEventListener("input", function() {
      // Remove anything not + - * /
      this.value = this.value.replace(/[^+\-*/]/g, "");

      // Restrict to only one character
      if (this.value.length > 1) {
        this.value = this.value.charAt(0);
      }
    });
  </script>
</body>
